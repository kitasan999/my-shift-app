<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- PWA & モバイル最適化メタタグ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Quick Shift Sync</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* 誤操作防止: テキスト選択とハイライトの無効化 */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      background-color: #f3f4f6; /* Tailwind bg-gray-100 */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    /* タップ時のハイライトを消去 */
    * {
      -webkit-tap-highlight-color: transparent;
    }

    /* スクロールバーの非表示（モバイルライクな見た目） */
    ::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // --- 設定と定数 ---
    const SHIFT_TYPES = {
      none: { id: 'none', label: '', color: 'bg-white', textClass: 'text-gray-800' },
      night1: { id: 'night1', label: '夜①', color: 'bg-blue-500', textClass: 'text-white', googleColorId: '9', title: '夜①' },
      request_off: { id: 'request_off', label: '希望休', color: 'bg-red-500', textClass: 'text-white', googleColorId: '11', title: '希望休' },
      off: { id: 'off', label: '休み', color: 'bg-green-500', textClass: 'text-white', googleColorId: '10', title: '休み' },
    };
    const SHIFT_ORDER = ['none', 'night1', 'request_off', 'off'];

    // --- インラインSVGアイコン ---
    const IconCalendar = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    );
    const IconCheck = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    );
    const IconSettings = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    );

    // --- メインアプリケーション ---
    const App = () => {
      // 状態管理
      const [clientId, setClientId] = useState(localStorage.getItem('qss_client_id') || '');
      const [isConfigMode, setIsConfigMode] = useState(!localStorage.getItem('qss_client_id'));
      const [accessToken, setAccessToken] = useState(null);
      const [tokenClient, setTokenClient] = useState(null);
      
      const [currentDate, setCurrentDate] = useState(new Date());
      const [shifts, setShifts] = useState({}); // { 'YYYY-MM-DD': 'night1' }
      const [isPreview, setIsPreview] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const [syncResult, setSyncResult] = useState(null);

      // --- Google認証初期化 ---
      useEffect(() => {
        if (!clientId || typeof google === 'undefined') return;

        try {
          const client = google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: 'https://www.googleapis.com/auth/calendar.events',
            callback: (response) => {
              if (response.error !== undefined) {
                console.error('Auth Error:', response);
                alert('認証に失敗しました。');
                return;
              }
              setAccessToken(response.access_token);
              // 同期リクエスト中だった場合はここで再開する処理を入れることも可能
            },
          });
          setTokenClient(client);
        } catch (e) {
          console.error("GIS Initialization failed:", e);
        }
      }, [clientId]);

      const handleLogin = () => {
        if (tokenClient) {
          tokenClient.requestAccessToken();
        } else {
          alert('Google認証クライアントが初期化されていません。Client IDを確認してください。');
        }
      };

      const saveClientId = (id) => {
        localStorage.setItem('qss_client_id', id);
        setClientId(id);
        setIsConfigMode(false);
      };

      // --- カレンダーロジック ---
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDayOfWeek = new Date(year, month, 1).getDay();

      const calendarCells = useMemo(() => {
        const cells = [];
        // 空白セル
        for (let i = 0; i < firstDayOfWeek; i++) {
          cells.push(null);
        }
        // 日付セル
        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          cells.push({ day: d, dateStr });
        }
        return cells;
      }, [year, month, daysInMonth, firstDayOfWeek]);

      const toggleShift = (dateStr) => {
        if (isPreview) return; // プレビュー中は編集不可
        setShifts(prev => {
          const currentShiftId = prev[dateStr] || 'none';
          const currentIndex = SHIFT_ORDER.indexOf(currentShiftId);
          const nextIndex = (currentIndex + 1) % SHIFT_ORDER.length;
          const nextShiftId = SHIFT_ORDER[nextIndex];
          
          const newShifts = { ...prev };
          if (nextShiftId === 'none') {
            delete newShifts[dateStr];
          } else {
            newShifts[dateStr] = nextShiftId;
          }
          return newShifts;
        });
      };

      const changeMonth = (offset) => {
        setCurrentDate(new Date(year, month + offset, 1));
      };

      // --- Google Calendar API 送信ロジック ---
      const createEventPayload = (dateStr, shiftTypeId) => {
        const shift = SHIFT_TYPES[shiftTypeId];
        if (!shift || shiftTypeId === 'none') return null;

        const payload = {
          summary: shift.title,
          colorId: shift.googleColorId,
        };

        if (shiftTypeId === 'night1') {
          // 夜①: 17:00 〜 翌09:00
          const startDate = new Date(`${dateStr}T17:00:00+09:00`);
          const endDate = new Date(startDate);
          endDate.setHours(startDate.getHours() + 16); // +16時間 = 翌9:00

          payload.start = { dateTime: startDate.toISOString(), timeZone: 'Asia/Tokyo' };
          payload.end = { dateTime: endDate.toISOString(), timeZone: 'Asia/Tokyo' };
        } else {
          // 終日イベント (希望休, 休み)
          // Google Calendar APIの仕様: 終日イベントの終了日は+1日
          const startDate = new Date(dateStr);
          const endDate = new Date(startDate);
          endDate.setDate(endDate.getDate() + 1);

          payload.start = { date: dateStr };
          payload.end = { date: endDate.toISOString().split('T')[0] };
        }

        return payload;
      };

      const syncToGoogleCalendar = async () => {
        if (!accessToken) {
          handleLogin();
          return;
        }

        setIsSyncing(true);
        setSyncResult(null);
        let successCount = 0;
        let authError = false;

        const shiftEntries = Object.entries(shifts);

        for (const [dateStr, shiftTypeId] of shiftEntries) {
          const eventPayload = createEventPayload(dateStr, shiftTypeId);
          if (!eventPayload) continue;

          try {
            const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${accessToken}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(eventPayload),
            });

            if (response.status === 401) {
              authError = true;
              break; // 401エラー発生時はループを抜けて再認証を促す
            }

            if (response.ok) {
              successCount++;
            } else {
              console.error(`Failed to create event for ${dateStr}:`, await response.text());
            }
          } catch (error) {
            console.error(`Network error for ${dateStr}:`, error);
          }
        }

        setIsSyncing(false);

        if (authError) {
          setAccessToken(null); // トークンを破棄
          setSyncResult({ type: 'error', message: '認証の有効期限が切れました。再度同期ボタンを押して認証してください。' });
          if (tokenClient) tokenClient.requestAccessToken(); // 自動的に再認証プロンプトを出す
        } else {
          setSyncResult({ type: 'success', message: `${successCount}件のシフトをカレンダーに登録しました！` });
          if (successCount > 0) {
            setShifts({}); // 成功したら選択状態をクリア
            setIsPreview(false);
          }
        }
      };

      // --- UI レンダリング ---
      
      // 1. 設定モードUI
      if (isConfigMode) {
        return (
          <div className="min-h-screen bg-gray-100 flex flex-col justify-center items-center p-4">
            <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
              <div className="flex items-center justify-center mb-6 text-blue-600">
                <IconSettings />
                <h1 className="text-xl font-bold ml-2">初期設定</h1>
              </div>
              <p className="text-sm text-gray-600 mb-4 text-center">
                Google Calendar APIを利用するための<br/>OAuth Client IDを入力してください。
              </p>
              <input
                type="text"
                className="w-full border border-gray-300 p-3 rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="12345...apps.googleusercontent.com"
                defaultValue={clientId}
                id="clientIdInput"
              />
              <button
                onClick={() => saveClientId(document.getElementById('clientIdInput').value.trim())}
                className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg active:bg-blue-700 transition shadow"
              >
                保存して始める
              </button>
              <div className="mt-4 text-xs text-gray-400 text-center">
                ※入力情報はブラウザのローカルストレージにのみ保存されます。
              </div>
            </div>
          </div>
        );
      }

      // 2. メインUI
      return (
        <div className="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-lg overflow-hidden pb-20 relative">
          {/* ヘッダー */}
          <header className="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md z-10">
            <div className="flex items-center gap-2">
              <IconCalendar />
              <h1 className="text-lg font-bold">Quick Shift Sync</h1>
            </div>
            <button onClick={() => setIsConfigMode(true)} className="p-2 active:bg-blue-700 rounded-full">
              <IconSettings />
            </button>
          </header>

          {/* 月切り替え */}
          <div className="flex justify-between items-center p-4 bg-gray-50 border-b">
            <button onClick={() => changeMonth(-1)} className="p-2 text-blue-600 font-bold text-xl active:bg-gray-200 rounded px-4">&lt;</button>
            <h2 className="text-xl font-bold text-gray-800">{year}年 {month + 1}月</h2>
            <button onClick={() => changeMonth(1)} className="p-2 text-blue-600 font-bold text-xl active:bg-gray-200 rounded px-4">&gt;</button>
          </div>

          {/* 凡例 */}
          <div className="flex justify-center gap-4 py-3 bg-white text-sm border-b">
            {SHIFT_ORDER.filter(id => id !== 'none').map(id => (
              <div key={id} className="flex items-center gap-1">
                <span className={`w-3 h-3 rounded-full ${SHIFT_TYPES[id].color}`}></span>
                <span className="text-gray-600">{SHIFT_TYPES[id].label}</span>
              </div>
            ))}
          </div>

          {/* カレンダーグリッド */}
          <div className="flex-1 overflow-y-auto p-2">
            <div className="grid grid-cols-7 gap-1 mb-2 text-center text-xs font-bold text-gray-500">
              <div className="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div className="text-blue-500">土</div>
            </div>
            <div className="grid grid-cols-7 gap-1">
              {calendarCells.map((cell, idx) => {
                if (!cell) return <div key={`empty-${idx}`} className="h-16"></div>;
                
                const shiftId = shifts[cell.dateStr] || 'none';
                const shift = SHIFT_TYPES[shiftId];
                
                // 日曜日と土曜日の文字色調整（シフトが入っていない時）
                const isSun = idx % 7 === 0;
                const isSat = idx % 7 === 6;
                let defaultTextClass = 'text-gray-800';
                if (shiftId === 'none') {
                  if (isSun) defaultTextClass = 'text-red-600';
                  if (isSat) defaultTextClass = 'text-blue-600';
                }

                return (
                  <div
                    key={cell.dateStr}
                    onClick={() => toggleShift(cell.dateStr)}
                    className={`h-16 flex flex-col items-center justify-center rounded-lg border border-gray-100 transition-colors cursor-pointer active:opacity-70 ${shift.color} ${shiftId !== 'none' ? 'shadow-sm' : 'bg-white hover:bg-gray-50'}`}
                  >
                    <span className={`text-sm font-semibold ${shiftId !== 'none' ? shift.textClass : defaultTextClass}`}>
                      {cell.day}
                    </span>
                    {shiftId !== 'none' && (
                      <span className={`text-[10px] font-bold ${shift.textClass} mt-1`}>
                        {shift.label}
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* プレビュー＆送信モーダル (Bottom Sheet) */}
          {Object.keys(shifts).length > 0 && (
            <div className={`fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] transition-transform duration-300 ease-in-out border-t border-gray-200 z-50 ${isPreview ? 'translate-y-0' : 'translate-y-[calc(100%-80px)]'}`}>
              
              {/* ハンドル部分（タップで展開/縮小） */}
              <div 
                className="h-20 flex items-center justify-between px-6 cursor-pointer"
                onClick={() => setIsPreview(!isPreview)}
              >
                <div className="flex flex-col">
                  <span className="text-sm text-gray-500 font-semibold">選択中</span>
                  <span className="text-lg font-bold text-blue-600">{Object.keys(shifts).length}件 のシフト</span>
                </div>
                <button className={`bg-blue-100 text-blue-600 px-4 py-2 rounded-full font-bold text-sm flex items-center gap-1 transition ${isPreview ? 'bg-gray-200 text-gray-700' : ''}`}>
                  {isPreview ? '閉じる' : '確認する'}
                </button>
              </div>

              {/* プレビューコンテンツ */}
              <div className="px-6 pb-6 max-h-[50vh] overflow-y-auto">
                {syncResult && (
                  <div className={`p-3 rounded-lg mb-4 text-sm font-bold ${syncResult.type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                    {syncResult.message}
                  </div>
                )}

                <ul className="space-y-2 mb-6">
                  {Object.entries(shifts).sort().map(([dateStr, shiftId]) => {
                    const shift = SHIFT_TYPES[shiftId];
                    const [y, m, d] = dateStr.split('-');
                    return (
                      <li key={dateStr} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                        <span className="font-semibold text-gray-700">{Number(m)}月{Number(d)}日</span>
                        <span className={`px-3 py-1 rounded text-xs font-bold ${shift.color} ${shift.textClass}`}>
                          {shift.label}
                        </span>
                      </li>
                    );
                  })}
                </ul>

                <button
                  onClick={syncToGoogleCalendar}
                  disabled={isSyncing}
                  className={`w-full py-4 rounded-xl font-bold text-white flex justify-center items-center gap-2 shadow-lg transition ${isSyncing ? 'bg-gray-400' : 'bg-blue-600 active:bg-blue-700'}`}
                >
                  {isSyncing ? (
                    '登録中...'
                  ) : (
                    <>
                      <IconCheck />
                      Googleカレンダーに一括登録
                    </>
                  )}
                </button>
              </div>
            </div>
          )}
          
          {/* 背景の暗転（プレビュー表示時） */}
          {isPreview && (
            <div 
              className="absolute inset-0 bg-black/20 z-40"
              onClick={() => setIsPreview(false)}
            ></div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
