<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瞬速シフト連携</title>
    
    <!-- アプリ化（PWA）のための設定：ホーム画面でアプリとして動作させます -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="シフト連携">
    <meta name="theme-color" content="#0f172a">
    
    <!-- 必要なライブラリの読み込み -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }
        /* タップ時の視覚的フィードバックを強化 */
        .active-scale:active { 
            transform: scale(0.95); 
            transition: transform 0.1s; 
        }
        /* テキスト選択を無効にしてアプリ感を出す */
        .no-select { 
            user-select: none; 
            -webkit-user-select: none; 
        }
        /* カスタムスクロールバー */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900 no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        // --- ★ここに取得した「クライアントID」を貼り付けてください ---
        const CLIENT_ID = "257695424437-js7hr2c6p1i0q4suhh5ipneoe7o6rneu.apps.googleusercontent.com";

        // アイコンをSVGで自前作成（外部エラーを完全に防ぎます）
        const Icon = ({ name, size = 20 }) => {
            const paths = {
                calendar: <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />,
                moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />,
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                coffee: <React.Fragment><path d="M17 8h1a4 4 0 1 1 0 8h-1M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z" /><path d="M6 2v2M10 2v2M14 2v2" /></React.Fragment>,
                trash: <React.Fragment><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" /></React.Fragment>,
                check: <path d="M20 6 9 17l-5-5" />,
                login: <React.Fragment><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3" /></React.Fragment>,
                refresh: <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V3m0 5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16m0 0v5m0-5h5" />,
                chevronLeft: <path d="m15 18-6-6 6-6" />,
                chevronRight: <path d="m9 18 6-6-6-6" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    {paths[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date()); 
            const [selectedDays, setSelectedDays] = useState({}); 
            const [activeMode, setActiveMode] = useState('night'); 
            const [isSyncing, setIsSyncing] = useState(false); 
            const [notification, setNotification] = useState(null); 
            const [tokenClient, setTokenClient] = useState(null);
            const [accessToken, setAccessToken] = useState(null);

            // シフト定義：GoogleカラーIDを指定（夜①=青, 希望休=赤, 休み=緑）
            const SHIFT_TYPES = {
                night: { label: '夜①', title: '夜①', start: '17:00', end: '09:00', color: 'bg-indigo-600', light: 'bg-indigo-50', text: 'text-indigo-600', icon: 'moon', googleColor: '9' },
                desired: { label: '希望休', title: '希望休', allDay: true, color: 'bg-red-500', light: 'bg-red-50', text: 'text-red-500', icon: 'heart', googleColor: '11' },
                off: { label: '休み', title: '休み', allDay: true, color: 'bg-emerald-500', light: 'bg-emerald-50', text: 'text-emerald-500', icon: 'coffee', googleColor: '10' }
            };

            // Google認証の初期化
            useEffect(() => {
                const initGSI = () => {
                    if (window.google && window.google.accounts) {
                        try {
                            const client = google.accounts.oauth2.initTokenClient({
                                client_id: CLIENT_ID,
                                scope: 'https://www.googleapis.com/auth/calendar.events',
                                callback: (response) => {
                                    if (response.access_token) {
                                        setAccessToken(response.access_token);
                                        setNotification("ログイン成功！準備完了です。");
                                        setTimeout(() => setNotification(null), 3000);
                                    }
                                },
                            });
                            setTokenClient(client);
                        } catch (e) {
                            console.error("GSI Init Error", e);
                        }
                    } else {
                        setTimeout(initGSI, 500); 
                    }
                };
                initGSI();
            }, []);

            const calendarData = useMemo(() => {
                const y = currentDate.getFullYear(), m = currentDate.getMonth();
                const days = [];
                const firstDay = new Date(y, m, 1).getDay();
                const lastDate = new Date(y, m + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let d = 1; d <= lastDate; d++) {
                    days.push({ day: d, dateStr: `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}` });
                }
                return days;
            }, [currentDate]);

            const handleDateClick = (dateStr) => {
                setSelectedDays(prev => {
                    const next = { ...prev };
                    if (next[dateStr] === activeMode) delete next[dateStr];
                    else next[dateStr] = activeMode;
                    return next;
                });
            };

            const syncToGoogle = async () => {
                if (CLIENT_ID.includes("ここに")) {
                    setNotification("クライアントIDを設定してください");
                    return;
                }
                
                if (!accessToken) {
                    if (tokenClient) tokenClient.requestAccessToken();
                    return;
                }
                
                setIsSyncing(true);
                try {
                    for (const [date, mode] of Object.entries(selectedDays)) {
                        const shift = SHIFT_TYPES[mode];
                        let event = { 
                            'summary': shift.title,
                            'colorId': shift.googleColor
                        };

                        if (shift.allDay) {
                            event.start = { 'date': date };
                            event.end = { 'date': date };
                        } else {
                            const startDateTime = `${date}T${shift.start}:00`;
                            const endDate = new Date(date);
                            endDate.setDate(endDate.getDate() + 1);
                            const endDateStr = endDate.toISOString().split('T')[0];
                            const endDateTime = `${endDateStr}T${shift.end}:00`;
                            event.start = { 'dateTime': startDateTime, 'timeZone': 'Asia/Tokyo' };
                            event.end = { 'dateTime': endDateTime, 'timeZone': 'Asia/Tokyo' };
                        }
                        
                        await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify(event)
                        });
                    }
                    setNotification("Googleカレンダーへ登録しました！");
                    setSelectedDays({});
                } catch (e) {
                    setNotification("エラーが発生しました。再試行してください。");
                    setAccessToken(null);
                }
                setIsSyncing(false);
                setTimeout(() => setNotification(null), 4000);
            };

            return (
                <div className="max-w-md mx-auto p-4 pt-6 md:pt-10">
                    <header className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 text-white p-2 rounded-xl shadow-lg"><Icon name="calendar" /></div>
                            <h1 className="font-black text-xl tracking-tighter italic text-left">瞬速シフト連携</h1>
                        </div>
                        <button 
                            onClick={() => tokenClient && tokenClient.requestAccessToken()} 
                            className={`p-2.5 rounded-full transition-all active-scale ${accessToken ? 'bg-emerald-500 text-white shadow-lg' : 'bg-white border-2 border-slate-100 text-slate-300 shadow-sm'}`}
                        >
                            <Icon name="login" size={20} />
                        </button>
                    </header>

                    {/* モード切替 */}
                    <div className="grid grid-cols-3 gap-2 mb-6">
                        {Object.entries(SHIFT_TYPES).map(([key, config]) => (
                            <button 
                                key={key} 
                                onClick={() => setActiveMode(key)} 
                                className={`flex flex-col items-center py-4 rounded-3xl font-black transition-all border-4 active-scale ${activeMode === key ? `${config.color} border-slate-200 text-white shadow-xl scale-[1.02]` : 'bg-white border-transparent text-slate-400 shadow-sm'}`}
                            >
                                <Icon name={config.icon} size={22} />
                                <span className="text-[12px] mt-1">{config.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* カレンダー本体 */}
                    <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden mb-6">
                        <div className="flex justify-between p-5 bg-slate-50 items-center">
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="p-2 active-scale text-slate-400"><Icon name="chevronLeft" size={20} /></button>
                            <span className="font-black text-slate-700">{currentDate.getFullYear()}年 {currentDate.getMonth()+1}月</span>
                            <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="p-2 active-scale text-slate-400"><Icon name="chevronRight" size={20} /></button>
                        </div>
                        <div className="grid grid-cols-7 gap-px bg-slate-100 text-left">
                            {calendarData.map((item, i) => {
                                const mode = item ? selectedDays[item.dateStr] : null;
                                return (
                                    <div 
                                        key={i} 
                                        onClick={() => item && handleDateClick(item.dateStr)} 
                                        className={`h-16 md:h-20 bg-white relative flex flex-col items-center justify-center cursor-pointer transition-colors active:bg-slate-50 ${mode ? SHIFT_TYPES[mode].light : ''}`}
                                    >
                                        {item && <span className={`text-[11px] font-bold ${item.day === new Date().getDate() ? 'text-blue-600' : 'text-slate-300'}`}>{item.day}</span>}
                                        {mode && <div className={`mt-1 px-1.5 py-0.5 rounded-lg text-[9px] font-black text-white shadow-sm ${SHIFT_TYPES[mode].color} animate-in fade-in zoom-in duration-200`}>{SHIFT_TYPES[mode].label}</div>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <button 
                        disabled={Object.keys(selectedDays).length === 0 || isSyncing} 
                        onClick={syncToGoogle} 
                        className={`w-full py-5 rounded-[2rem] font-black flex items-center justify-center gap-3 transition-all active-scale ${Object.keys(selectedDays).length > 0 ? 'bg-slate-900 text-white shadow-2xl' : 'bg-slate-100 text-slate-300'}`}
                    >
                        {isSyncing ? <div className="animate-spin text-white"><Icon name="refresh" /></div> : <><Icon name="check" size={20} />Googleカレンダーを更新</>}
                    </button>

                    {notification && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900/95 backdrop-blur-md text-white px-8 py-4 rounded-full flex items-center gap-3 shadow-2xl z-50 animate-in fade-in slide-in-from-bottom-5 text-center">
                            <Icon name="check" size={18} className="text-emerald-400" />
                            <p className="text-xs font-bold tracking-tight">{notification}</p>
                        </div>
                    )}
                </div>
            );
        };

        const init = () => {
            const rootEl = document.getElementById('root');
            if (rootEl) {
                const root = ReactDOM.createRoot(rootEl);
                root.render(<App />);
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
