<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- PWA & モバイル最適化メタタグ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Quick Shift Sync</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* 誤操作防止: テキスト選択とハイライトの無効化 */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      background-color: #f3f4f6; /* Tailwind bg-gray-100 */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    /* タップ時のハイライトを消去 */
    * {
      -webkit-tap-highlight-color: transparent;
    }

    /* スクロールバーの非表示（モバイルライクな見た目） */
    ::-webkit-scrollbar {
      display: none;
    }

    /* トースト通知用アニメーション */
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-toast {
      animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // --- 設定と定数 ---
    const SHIFT_TYPES = {
      none: { id: 'none', label: '', color: 'bg-white', textClass: 'text-gray-800' },
      night1: { id: 'night1', label: '夜①', color: 'bg-blue-500', textClass: 'text-white', googleColorId: '9', title: '夜①' },
      request_off: { id: 'request_off', label: '希望休', color: 'bg-red-500', textClass: 'text-white', googleColorId: '11', title: '希望休' },
      off: { id: 'off', label: '休み', color: 'bg-green-500', textClass: 'text-white', googleColorId: '10', title: '休み' },
    };
    const SHIFT_ORDER = ['none', 'night1', 'request_off', 'off'];

    // --- インラインSVGアイコン ---
    const IconCalendar = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    );
    const IconCheck = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    );
    const IconSettings = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    );
    const IconSpinner = () => (
      <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
    );
    const IconClose = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    );

    // --- メインアプリケーション ---
    const App = () => {
      // 状態管理
      const [clientId, setClientId] = useState(localStorage.getItem('qss_client_id') || '');
      // 修正: 初期表示を必ずカレンダー（メイン画面）にする
      const [isConfigMode, setIsConfigMode] = useState(false);
      const [accessToken, setAccessToken] = useState(null);
      
      const [currentDate, setCurrentDate] = useState(new Date());
      const [shifts, setShifts] = useState({}); // { 'YYYY-MM-DD': 'night1' }
      const [isPreview, setIsPreview] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const [toast, setToast] = useState(null); // { type: 'success'|'error', message: '' }

      // トースト自動非表示タイマー
      useEffect(() => {
        if (toast) {
          const timer = setTimeout(() => setToast(null), 4000);
          return () => clearTimeout(timer);
        }
      }, [toast]);

      const saveClientId = (id) => {
        localStorage.setItem('qss_client_id', id);
        setClientId(id);
        setIsConfigMode(false);
      };

      // --- カレンダーロジック ---
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDayOfWeek = new Date(year, month, 1).getDay();

      const calendarCells = useMemo(() => {
        const cells = [];
        // 空白セル
        for (let i = 0; i < firstDayOfWeek; i++) {
          cells.push(null);
        }
        // 日付セル
        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          cells.push({ day: d, dateStr });
        }
        return cells;
      }, [year, month, daysInMonth, firstDayOfWeek]);

      const toggleShift = (dateStr) => {
        if (isPreview) return; // プレビュー中は編集不可
        setShifts(prev => {
          const currentShiftId = prev[dateStr] || 'none';
          const currentIndex = SHIFT_ORDER.indexOf(currentShiftId);
          const nextIndex = (currentIndex + 1) % SHIFT_ORDER.length;
          const nextShiftId = SHIFT_ORDER[nextIndex];
          
          const newShifts = { ...prev };
          if (nextShiftId === 'none') {
            delete newShifts[dateStr];
          } else {
            newShifts[dateStr] = nextShiftId;
          }
          return newShifts;
        });
      };

      const changeMonth = (offset) => {
        setCurrentDate(new Date(year, month + offset, 1));
      };

      // --- Google Calendar API 送信ロジック ---
      const createEventPayload = (dateStr, shiftTypeId) => {
        const shift = SHIFT_TYPES[shiftTypeId];
        if (!shift || shiftTypeId === 'none') return null;

        const payload = {
          summary: shift.title,
          colorId: shift.googleColorId,
        };

        if (shiftTypeId === 'night1') {
          // 夜①: 17:00 〜 翌09:00
          const startDate = new Date(`${dateStr}T17:00:00+09:00`);
          const endDate = new Date(startDate);
          endDate.setHours(startDate.getHours() + 16); // +16時間 = 翌9:00

          payload.start = { dateTime: startDate.toISOString(), timeZone: 'Asia/Tokyo' };
          payload.end = { dateTime: endDate.toISOString(), timeZone: 'Asia/Tokyo' };
        } else {
          // 終日イベント (希望休, 休み)
          // Google Calendar APIの仕様: 終日イベントの終了日は+1日
          const startDate = new Date(dateStr);
          const endDate = new Date(startDate);
          endDate.setDate(endDate.getDate() + 1);

          payload.start = { date: dateStr };
          payload.end = { date: endDate.toISOString().split('T')[0] };
        }

        return payload;
      };

      const syncToGoogleCalendar = async () => {
        // 修正: Client IDが未設定の場合は設定画面へ誘導する
        if (!clientId) {
          alert('Googleカレンダーに登録するためには、初回のみClient IDの設定が必要です。設定画面に移動します。');
          setIsConfigMode(true);
          return;
        }

        if (typeof google === 'undefined') {
          alert('Googleの認証システムを読み込み中です。数秒待ってから再度お試しください。');
          return;
        }

        let currentToken = accessToken;

        // トークンがない場合（初回、または有効期限切れ後）はここで取得
        if (!currentToken) {
          try {
            currentToken = await new Promise((resolve, reject) => {
              const client = google.accounts.oauth2.initTokenClient({
                client_id: clientId,
                scope: 'https://www.googleapis.com/auth/calendar.events',
                callback: (response) => {
                  if (response.error !== undefined) {
                    console.error('Auth Error:', response);
                    alert('認証に失敗しました。設定したClient IDに誤りがないか確認してください。');
                    reject(response.error);
                    return;
                  }
                  setAccessToken(response.access_token);
                  resolve(response.access_token);
                },
              });
              client.requestAccessToken();
            });
          } catch (error) {
            // 認証キャンセルやエラー時は処理を中断
            return;
          }
        }

        setIsSyncing(true);
        setToast(null);
        let successCount = 0;
        let authError = false;

        const shiftEntries = Object.entries(shifts);

        for (const [dateStr, shiftTypeId] of shiftEntries) {
          const eventPayload = createEventPayload(dateStr, shiftTypeId);
          if (!eventPayload) continue;

          try {
            const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${currentToken}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(eventPayload),
            });

            if (response.status === 401) {
              authError = true;
              break; // 401エラー発生時はループを抜けて再認証を促す
            }

            if (response.ok) {
              successCount++;
            } else {
              console.error(`Failed to create event for ${dateStr}:`, await response.text());
            }
          } catch (error) {
            console.error(`Network error for ${dateStr}:`, error);
          }
        }

        setIsSyncing(false);

        if (authError) {
          setAccessToken(null); // トークンを破棄
          setToast({ type: 'error', message: '認証の有効期限が切れました。再度お試しください。' });
        } else {
          setToast({ type: 'success', message: `${successCount}件のシフトをカレンダーに登録しました！` });
          if (successCount > 0) {
            setShifts({}); // 成功したら選択状態をクリア
            setIsPreview(false);
          }
        }
      };

      // --- UI レンダリング ---
      
      // 1. 設定モードUI
      if (isConfigMode) {
        return (
          <div className="min-h-screen bg-gray-100 flex flex-col justify-center items-center p-4 relative">
            {/* 戻るボタン */}
            <button 
              onClick={() => setIsConfigMode(false)}
              className="absolute top-4 left-4 text-gray-500 hover:text-gray-800 font-bold p-2"
            >
              ← 戻る
            </button>
            <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
              <div className="flex items-center justify-center mb-6 text-blue-600">
                <IconSettings />
                <h1 className="text-xl font-bold ml-2">初期設定</h1>
              </div>
              <p className="text-sm text-gray-600 mb-4 text-center">
                Google Calendar APIを利用するための<br/>OAuth Client IDを入力してください。
              </p>
              <input
                type="text"
                className="w-full border border-gray-300 p-3 rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="12345...apps.googleusercontent.com"
                defaultValue={clientId}
                id="clientIdInput"
              />
              <button
                onClick={() => saveClientId(document.getElementById('clientIdInput').value.trim())}
                className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg active:bg-blue-700 transition shadow"
              >
                保存してカレンダーに戻る
              </button>
              <div className="mt-4 text-xs text-gray-400 text-center">
                ※入力情報はブラウザのローカルストレージにのみ保存されます。
              </div>
            </div>
          </div>
        );
      }

      // 2. メインUI
      return (
        <div className="min-h-screen flex flex-col max-w-md mx-auto bg-gray-50 shadow-2xl overflow-hidden pb-20 relative">
          
          {/* トースト通知 */}
          {toast && (
            <div className={`absolute top-4 left-4 right-4 z-50 flex items-center p-4 rounded-2xl shadow-lg animate-toast ${toast.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
              <div className="flex-1 text-sm font-bold">{toast.message}</div>
              <button onClick={() => setToast(null)} className="p-1 opacity-80 hover:opacity-100"><IconClose /></button>
            </div>
          )}

          {/* ヘッダー */}
          <header className="bg-white/80 backdrop-blur-md text-gray-800 p-4 flex justify-between items-center z-10 sticky top-0">
            <div className="flex items-center gap-2 text-blue-600">
              <IconCalendar />
              <h1 className="text-xl font-extrabold tracking-tight">Quick Shift</h1>
            </div>
            <button onClick={() => setIsConfigMode(true)} className="p-2 text-gray-500 hover:text-gray-800 active:bg-gray-200 rounded-full transition-colors">
              <IconSettings />
            </button>
          </header>

          {/* 月切り替え */}
          <div className="flex justify-between items-center p-4">
            <button onClick={() => changeMonth(-1)} className="p-3 bg-white shadow-sm text-gray-600 active:bg-gray-100 rounded-xl transition-all active:scale-95">&lt;</button>
            <h2 className="text-xl font-black text-gray-800 tracking-wider">{year}年 {month + 1}月</h2>
            <button onClick={() => changeMonth(1)} className="p-3 bg-white shadow-sm text-gray-600 active:bg-gray-100 rounded-xl transition-all active:scale-95">&gt;</button>
          </div>

          {/* 凡例 */}
          <div className="mx-4 mb-2 flex justify-center gap-5 p-4 bg-white rounded-2xl shadow-sm text-xs font-bold text-gray-600">
            {SHIFT_ORDER.filter(id => id !== 'none').map(id => (
              <div key={id} className="flex flex-col items-center gap-1">
                <span className={`w-4 h-4 rounded-full shadow-inner ${SHIFT_TYPES[id].color}`}></span>
                <span>{SHIFT_TYPES[id].label}</span>
              </div>
            ))}
          </div>

          {/* カレンダーグリッド */}
          <div className="flex-1 overflow-y-auto px-4 pb-6">
            <div className="grid grid-cols-7 gap-2 mb-2 text-center text-xs font-black text-gray-400">
              <div className="text-red-400">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div className="text-blue-400">土</div>
            </div>
            <div className="grid grid-cols-7 gap-2">
              {calendarCells.map((cell, idx) => {
                if (!cell) return <div key={`empty-${idx}`} className="h-14"></div>;
                
                const shiftId = shifts[cell.dateStr] || 'none';
                const shift = SHIFT_TYPES[shiftId];
                
                // 今日の日付判定（タイムゾーンのズレを防ぐため文字列比較）
                const today = new Date();
                const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
                const isToday = cell.dateStr === todayStr;
                
                // 日曜日と土曜日の文字色調整
                const isSun = idx % 7 === 0;
                const isSat = idx % 7 === 6;
                let defaultTextClass = 'text-gray-700';
                if (shiftId === 'none') {
                  if (isSun) defaultTextClass = 'text-red-500';
                  if (isSat) defaultTextClass = 'text-blue-500';
                }

                return (
                  <div
                    key={cell.dateStr}
                    onClick={() => toggleShift(cell.dateStr)}
                    className={`h-14 flex flex-col items-center justify-center rounded-xl transition-all duration-200 cursor-pointer active:scale-90 select-none ${
                      shiftId !== 'none' 
                        ? `${shift.color} shadow-md border-transparent` 
                        : isToday 
                          ? 'bg-blue-50 border-2 border-blue-400'
                          : 'bg-white border border-gray-100 hover:bg-gray-50 shadow-sm'
                    }`}
                  >
                    <span className={`text-sm font-black ${shiftId !== 'none' ? shift.textClass : defaultTextClass}`}>
                      {cell.day}
                    </span>
                    {shiftId !== 'none' && (
                      <span className={`text-[9px] font-bold ${shift.textClass} tracking-tighter`}>
                        {shift.label}
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* プレビュー＆送信モーダル (Bottom Sheet) */}
          {Object.keys(shifts).length > 0 && (
            <div className={`fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white/90 backdrop-blur-xl rounded-t-[2rem] shadow-[0_-20px_40px_rgba(0,0,0,0.1)] transition-transform duration-500 cubic-bezier(0.32, 0.72, 0, 1) border-t border-white/50 z-40 ${isPreview ? 'translate-y-0' : 'translate-y-[calc(100%-88px)]'}`}>
              
              {/* ハンドル部分（タップで展開/縮小） */}
              <div 
                className="h-22 flex flex-col items-center px-6 pt-3 pb-4 cursor-pointer"
                onClick={() => setIsPreview(!isPreview)}
              >
                <div className="w-12 h-1.5 bg-gray-300 rounded-full mb-3"></div>
                <div className="w-full flex justify-between items-center">
                  <div className="flex flex-col">
                    <span className="text-xs text-gray-500 font-bold tracking-wider">SELECTED SHIFTS</span>
                    <span className="text-xl font-black text-blue-600">{Object.keys(shifts).length}件</span>
                  </div>
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center transition-colors ${isPreview ? 'bg-gray-200 text-gray-600' : 'bg-blue-100 text-blue-600'}`}>
                    <svg className={`transform transition-transform duration-300 ${isPreview ? 'rotate-180' : ''}`} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                  </div>
                </div>
              </div>

              {/* プレビューコンテンツ */}
              <div className="px-6 pb-8 max-h-[60vh] overflow-y-auto">
                <ul className="space-y-3 mb-6">
                  {Object.entries(shifts).sort().map(([dateStr, shiftId]) => {
                    const shift = SHIFT_TYPES[shiftId];
                    const [y, m, d] = dateStr.split('-');
                    return (
                      <li key={dateStr} className="flex justify-between items-center p-4 bg-white rounded-2xl shadow-sm border border-gray-100">
                        <span className="font-extrabold text-gray-800 text-lg">{Number(m)}<span className="text-sm font-medium text-gray-500 mx-1">/</span>{Number(d)}</span>
                        <span className={`px-4 py-1.5 rounded-full text-xs font-bold shadow-sm ${shift.color} ${shift.textClass}`}>
                          {shift.label}
                        </span>
                      </li>
                    );
                  })}
                </ul>

                <button
                  onClick={syncToGoogleCalendar}
                  disabled={isSyncing}
                  className={`w-full py-4 rounded-2xl font-black text-white flex justify-center items-center gap-2 shadow-xl transition-all duration-300 ${isSyncing ? 'bg-gray-400 scale-95' : 'bg-blue-600 hover:bg-blue-700 active:scale-95'}`}
                >
                  {isSyncing ? (
                    <>
                      <IconSpinner />
                      同期中...
                    </>
                  ) : (
                    <>
                      <IconCheck />
                      Googleカレンダーに登録
                    </>
                  )}
                </button>
              </div>
            </div>
          )}
          
          {/* 背景の暗転（プレビュー表示時） */}
          <div 
            className={`absolute inset-0 bg-gray-900/40 backdrop-blur-sm z-30 transition-opacity duration-300 ${isPreview ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}
            onClick={() => setIsPreview(false)}
          ></div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
